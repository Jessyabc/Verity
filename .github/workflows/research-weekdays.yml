# Weekday morning Perplexity refresh (Mon–Fri). Adjust cron for your timezone (UTC by default).
# Secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, PERPLEXITY_API_KEY.
# Optional: WATCHLIST_SLUGS fallback when user_watchlist is empty (if using WATCHLIST_FROM_DB).

name: Research watchlist (weekdays)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1-5'

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Refresh research
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_MODEL: ${{ secrets.PERPLEXITY_MODEL }}
          WATCHLIST_SLUGS: ${{ secrets.WATCHLIST_SLUGS }}
          WATCHLIST_FROM_DB: 'true'
        run: npm run research:watchlist
