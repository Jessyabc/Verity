# Optional Sat/Sun — enable by uncommenting `schedule` below and setting secret WEEKEND_RESEARCH=true.
# Manual runs always pass WEEKEND_RESEARCH to the script so weekend days are not skipped.

name: Research watchlist (weekends)

on:
  workflow_dispatch:
  # Uncomment for automatic Sat/Sun 08:00 UTC:
  # schedule:
  #   - cron: '0 8 * * 0,6'

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Refresh research (weekend)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_MODEL: ${{ secrets.PERPLEXITY_MODEL }}
          WATCHLIST_SLUGS: ${{ secrets.WATCHLIST_SLUGS }}
          WATCHLIST_FROM_DB: 'true'
          WEEKEND_RESEARCH: 'true'
        run: npm run research:watchlist
