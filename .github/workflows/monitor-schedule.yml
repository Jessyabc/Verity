# Runs monitor:once — seeds SEC EDGAR sources for watchlisted CIK companies with no sources,
# then pilot URLs from pilot-urls.json, then every other company_sources row.
# Secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

name: Monitor once

on:
  workflow_dispatch:
  schedule:
    - cron: '25 */6 * * *'

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Run monitor
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run monitor:once
